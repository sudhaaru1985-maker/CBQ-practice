<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CVS Case-Based Questions – MBBS Practice</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,500;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --navy:#0d2b45;
  --teal:#1a8a82;
  --gold:#c8922a;
  --crimson:#a02030;
  --bg:#f6f5f0;
  --card:#ffffff;
  --border:#ddd9d0;
  --text:#1a1a1e;
  --muted:#6b6b72;
  --correct-bg:#edf7f0;
  --correct-border:#6abf8a;
  --correct-text:#1a4a28;
  --partial-bg:#fff8e8;
  --partial-border:#e0b84a;
  --partial-text:#5a3a00;
  --wrong-bg:#fef0f0;
  --wrong-border:#e0807a;
  --wrong-text:#4a1010;
}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);font-size:15px;line-height:1.7}

/* ── Header ── */
.header{background:var(--navy);padding:2.5rem 2rem 2rem;position:relative;overflow:hidden}
.header::before{content:'';position:absolute;right:-30px;top:-50px;width:200px;height:200px;border-radius:50%;border:36px solid rgba(200,146,42,.1)}
.header::after{content:'';position:absolute;left:55%;bottom:-40px;width:140px;height:140px;border-radius:50%;border:28px solid rgba(26,138,130,.12)}
.header-eyebrow{font-size:.68rem;font-weight:600;letter-spacing:.16em;text-transform:uppercase;color:var(--gold);margin-bottom:.55rem}
.header h1{font-family:'Lora',serif;font-size:2rem;font-weight:600;color:#fff;line-height:1.2;margin-bottom:.5rem}
.header p{font-size:.85rem;color:rgba(255,255,255,.55);max-width:520px}
.header-tags{display:flex;flex-wrap:wrap;gap:.4rem;margin-top:1.1rem}
.header-tag{font-size:.68rem;font-weight:500;letter-spacing:.04em;padding:.22rem .7rem;border-radius:99px;background:rgba(255,255,255,.09);color:rgba(255,255,255,.75);border:1px solid rgba(255,255,255,.14)}

/* ── Sticky nav ── */
.case-nav{position:sticky;top:0;z-index:200;background:#fff;border-bottom:1px solid var(--border);display:flex;overflow-x:auto;scrollbar-width:none;padding:0 1.5rem}
.case-nav::-webkit-scrollbar{display:none}
.cnav-btn{flex-shrink:0;padding:.7rem 1.05rem;font-size:.78rem;font-weight:600;font-family:'DM Sans',sans-serif;background:none;border:none;border-bottom:2.5px solid transparent;cursor:pointer;color:var(--muted);transition:color .15s,border-color .15s;white-space:nowrap}
.cnav-btn:hover{color:var(--navy)}
.cnav-btn.active{color:var(--navy);border-bottom-color:var(--gold)}

/* ── Body ── */
.body{max-width:820px;margin:0 auto;padding:2rem 1.5rem 5rem}

/* ── Case block ── */
.case-block{margin-bottom:4.5rem;scroll-margin-top:50px}
.case-hr{border:none;border-top:1px dashed var(--border);margin:0 0 4rem}

/* ── Case header ── */
.case-hdr{border-bottom:2px solid var(--navy);padding-bottom:.75rem;margin-bottom:1.25rem}
.case-eyebrow{font-size:.68rem;font-weight:700;letter-spacing:.14em;text-transform:uppercase;color:var(--gold);margin-bottom:.25rem}
.case-title{font-family:'Lora',serif;font-size:1.45rem;font-weight:600;color:var(--navy)}
.case-depts{font-size:.76rem;color:var(--muted);margin-top:.2rem}

/* ── Vignette ── */
.vignette{background:#fff;border-left:4px solid var(--teal);border-radius:0 10px 10px 0;border:1px solid var(--border);border-left-width:4px;border-left-color:var(--teal);padding:1.1rem 1.3rem;margin-bottom:1.75rem}
.vig-label{font-size:.65rem;font-weight:700;letter-spacing:.13em;text-transform:uppercase;color:var(--teal);margin-bottom:.5rem}
.vignette p{font-size:.93rem;line-height:1.75;color:var(--text)}

/* ── Section heading ── */
.sect-hdr{display:inline-flex;align-items:center;gap:.45rem;font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#fff;padding:.28rem .85rem;border-radius:99px;margin:1.5rem 0 .85rem}
.dept-physio{background:#0f5c8a}.dept-path{background:#6a1e8a}.dept-pharma{background:#1a6b3a}
.dept-anat{background:#7a3a1a}.dept-biochem{background:#1a4a8a}.dept-micro{background:#8a1a1a}
.dept-general{background:#3a3a4a}

/* ── Question card ── */
.q-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1.2rem 1.3rem;margin-bottom:1rem;transition:border-color .2s}
.q-card:focus-within{border-color:var(--teal)}
.q-top{display:flex;gap:.75rem;align-items:flex-start;margin-bottom:.9rem}
.q-badge{flex-shrink:0;min-width:30px;height:30px;border-radius:7px;background:var(--navy);color:#fff;font-size:.72rem;font-weight:700;display:flex;align-items:center;justify-content:center;padding:0 6px;font-family:'Lora',serif}
.q-text{font-size:.94rem;color:var(--text);line-height:1.6;padding-top:3px}
.q-hint{font-size:.78rem;color:var(--muted);margin-top:.25rem;font-style:italic}

/* ── Textarea ── */
.q-textarea{width:100%;min-height:90px;padding:.7rem .9rem;font-size:.88rem;font-family:'DM Sans',sans-serif;border:1px solid var(--border);border-radius:8px;resize:vertical;background:#fafaf7;color:var(--text);line-height:1.6;transition:border-color .15s,background .15s}
.q-textarea:focus{outline:none;border-color:var(--teal);background:#fff}
.q-textarea:disabled{opacity:.65;cursor:not-allowed}
.q-textarea::placeholder{color:#aaa}

/* ── Submit ── */
.submit-btn{margin-top:.6rem;padding:.42rem 1.05rem;font-size:.8rem;font-weight:600;font-family:'DM Sans',sans-serif;background:var(--navy);color:#fff;border:none;border-radius:7px;cursor:pointer;transition:background .15s,opacity .15s}
.submit-btn:hover{background:#1a4a70}
.submit-btn:disabled{opacity:.45;cursor:not-allowed}

/* ── Loading ── */
.loading{display:none;align-items:center;gap:.5rem;margin-top:.7rem;font-size:.82rem;color:var(--muted)}
.loading.show{display:flex}
.spinner{width:14px;height:14px;border:2px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}

/* ── Feedback ── */
.feedback{display:none;margin-top:.85rem;border-radius:10px;padding:1rem 1.15rem;border:1px solid}
.feedback.show{display:block}
.feedback.correct{background:var(--correct-bg);border-color:var(--correct-border)}
.feedback.partial{background:var(--partial-bg);border-color:var(--partial-border)}
.feedback.incorrect{background:var(--wrong-bg);border-color:var(--wrong-border)}
.fb-label{font-size:.7rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;margin-bottom:.45rem}
.feedback.correct .fb-label{color:var(--teal)}
.feedback.partial .fb-label{color:#8a6000}
.feedback.incorrect .fb-label{color:var(--crimson)}
.fb-verdict{font-size:.9rem;font-weight:600;margin-bottom:.5rem}
.feedback.correct .fb-verdict{color:var(--correct-text)}
.feedback.partial .fb-verdict{color:var(--partial-text)}
.feedback.incorrect .fb-verdict{color:var(--wrong-text)}
.fb-body{font-size:.86rem;line-height:1.65;color:var(--text)}
.fb-body ul{padding-left:1.1rem;margin-top:.4rem}
.fb-body li{margin-bottom:.3rem}
.fb-body li::marker{color:var(--teal)}
.fb-body strong{font-weight:600}
.fb-encourage{margin-top:.65rem;font-size:.82rem;font-style:italic;color:var(--muted);padding-top:.55rem;border-top:1px solid rgba(0,0,0,.07)}

/* ── Try again ── */
.retry-btn{margin-top:.55rem;padding:.35rem .85rem;font-size:.77rem;font-weight:600;font-family:'DM Sans',sans-serif;background:transparent;color:var(--navy);border:1px solid var(--navy);border-radius:6px;cursor:pointer;transition:background .15s,color .15s}
.retry-btn:hover{background:var(--navy);color:#fff}

@media(max-width:600px){
  .header h1{font-size:1.5rem}
  .body{padding:1.25rem 1rem 4rem}
  .q-card{padding:1rem}
}
</style>
</head>

<script>
/* ═══════════════════════════════════════════
   CASE DATA
═══════════════════════════════════════════ */
const CASES = [
{
  id:'htn', title:'Hypertension', num:1,
  depts:'Physiology · Pathology · Pharmacology',
  vignette:'A 52-year-old male presents for a routine check-up. He has a sedentary lifestyle and consumes a high-salt diet. His blood pressure is 160/100 mmHg on repeated measurements. Renal function tests are normal.',
  sections:[
    {label:'Physiology', cls:'dept-physio', qs:[
      {id:'htn-1', badge:'Q1', text:'Explain the physiological mechanisms responsible for long-term regulation of blood pressure.', hint:'Think about the key systems: renal, hormonal, and nervous.', model:'Long-term BP regulation involves: (1) Renal fluid volume control — kidneys adjust Na⁺ and water excretion to maintain blood volume; (2) RAAS — renin → angiotensin II → aldosterone → Na⁺ retention → ↑ blood volume → ↑ CO; (3) Antidiuretic hormone (ADH) — promotes water reabsorption; (4) Atrial natriuretic peptide (ANP) — released from atria when blood volume is high → promotes Na⁺ excretion → lowers BP; (5) Sympathetic nervous system — chronic activation → vasoconstriction and ↑ cardiac output. The kidney\'s pressure-natriuresis relationship is the dominant long-term mechanism: as BP rises, the kidney excretes more Na⁺ and water until a new equilibrium is reached.'},
      {id:'htn-2', badge:'Q2', text:'Describe the role of baroreceptors in short-term regulation and why they reset in chronic hypertension.', hint:'Where are baroreceptors located? What happens when BP is chronically elevated?', model:'Baroreceptors are mechanoreceptors in the carotid sinus and aortic arch that detect wall stretch. When BP rises acutely → increased baroreceptor firing → inhibit sympathetic outflow via the vasomotor centre → reduce heart rate, stroke volume, and peripheral resistance → BP normalises (short-term). In chronic hypertension, sustained high pressure causes structural changes in vessel walls around the baroreceptors → the receptors reset or adapt to the higher pressure level → they no longer perceive elevated BP as abnormal → lose their corrective response. This resetting means baroreceptors maintain whatever BP they are chronically exposed to, making them ineffective in correcting chronic hypertension.'},
      {id:'htn-3', badge:'Q3', text:'List TWO causes of secondary hypertension.', hint:'Secondary hypertension has an identifiable underlying cause. List all you know — only two are needed.', model:'All possible causes of secondary hypertension include: (1) Renal parenchymal disease (chronic kidney disease, glomerulonephritis); (2) Renovascular disease (renal artery stenosis — causes ↑ renin → ↑ angiotensin II); (3) Primary hyperaldosteronism (Conn\'s syndrome — adrenal adenoma secreting excess aldosterone → Na⁺ retention); (4) Phaeochromocytoma (catecholamine-secreting adrenal tumour → episodic severe hypertension); (5) Cushing\'s syndrome (excess cortisol → Na⁺ retention); (6) Coarctation of the aorta (congenital narrowing → ↑ BP in upper limbs); (7) Hyperthyroidism; (8) Obstructive sleep apnoea. Any two of these are acceptable.'},
    ]},
    {label:'Pathology', cls:'dept-path', qs:[
      {id:'htn-4', badge:'Q4', text:'Describe the histological vascular changes seen in chronic (benign) hypertension.', hint:'Focus on the arterioles — what happens to the wall and lumen?', model:'In chronic benign hypertension: (1) Hyaline arteriolosclerosis — homogeneous pink (hyaline) material (plasma protein insudation + thickened basement membrane) deposits in arteriolar walls → wall thickens, lumen narrows. Most prominent in renal and retinal arterioles. (2) Medial hypertrophy — smooth muscle cell hyperplasia/hypertrophy increases the media → raised wall-to-lumen ratio → reduced vessel compliance. (3) Intimal fibrosis — fibroblast proliferation under the endothelium. These changes reduce vessel compliance and impair autoregulation, contributing to end-organ ischaemia.'},
      {id:'htn-5', badge:'Q5', text:'What histological changes occur in malignant (accelerated) hypertension?', hint:'Malignant hypertension is a distinct and more severe form — what makes it different at the microscopic level?', model:'Malignant hypertension (BP typically >180/120 mmHg with end-organ damage) shows: (1) Hyperplastic arteriolosclerosis — "onion-skin" lesion: concentric proliferation of smooth muscle cells in arteriolar walls producing a laminated appearance, severely narrowing the lumen. (2) Fibrinoid necrosis of arterioles — plasma proteins, including fibrin, deposit in the wall (bright pink on H&E) → necrosis of smooth muscle cells → vascular rupture and micro-infarcts. These two features — hyperplastic/onion-skin change and fibrinoid necrosis — distinguish malignant from benign hypertension histologically.'},
      {id:'htn-6', badge:'Q6', text:'Describe the morphological (macroscopic and microscopic) changes in the organs affected by hypertension.', hint:'Think heart, kidneys, brain, eyes.', model:'Heart: left ventricular hypertrophy (concentric; wall >15 mm) → increased cardiac weight; can progress to dilated cardiomyopathy and heart failure. Kidney: "flea-bitten" kidney macroscopically (petechial cortical haemorrhages in malignant hypertension); microscopically — hyaline arteriolosclerosis → ischaemic glomerular obsolescence → nephrosclerosis → reduced GFR. Brain: Charcot-Bouchard microaneurysms on small penetrating arteries → rupture → intracerebral haemorrhage (lacunar infarcts from small vessel disease). Retina: AV nipping, haemorrhages, exudates, papilloedema (grade IV = malignant hypertension). Aorta: accelerated atherosclerosis; aortic aneurysm formation.'},
      {id:'htn-7', badge:'Q7', text:'List FOUR complications of hypertension.', hint:'Think across all organ systems — heart, brain, kidney, eyes, vessels. List all you know; only four are needed.', model:'All possible complications: (1) Ischaemic heart disease / myocardial infarction; (2) Heart failure (from LVH and systolic dysfunction); (3) Stroke (ischaemic or haemorrhagic); (4) Hypertensive nephropathy → chronic kidney disease; (5) Hypertensive retinopathy → visual impairment; (6) Aortic aneurysm / aortic dissection; (7) Peripheral arterial disease; (8) Atrial fibrillation (from LA dilatation secondary to LVH). Any four of these are acceptable.'},
    ]},
    {label:'Pharmacology', cls:'dept-pharma', qs:[
      {id:'htn-8', badge:'Q8', text:'Which class of drugs targets the RAAS system? Explain the mechanism with one example.', hint:'There is more than one drug class that targets RAAS — name one and explain it well.', model:'Drug classes targeting RAAS: (1) ACE inhibitors (e.g. ramipril, enalapril) — block angiotensin-converting enzyme → ↓ angiotensin II → reduced vasoconstriction and reduced aldosterone secretion → ↓ TPR and ↓ blood volume → lower BP; also renoprotective. (2) Angiotensin II receptor blockers/ARBs (e.g. losartan, valsartan) — block AT1 receptors → same downstream effects as ACEi without bradykinin accumulation (fewer cough side effects). (3) Direct renin inhibitors (e.g. aliskiren) — inhibit renin directly → ↓ conversion of angiotensinogen to angiotensin I. (4) Aldosterone antagonists (e.g. spironolactone) — block aldosterone receptor → ↓ Na⁺ retention → ↓ blood volume. Any one class with its mechanism is sufficient.'},
      {id:'htn-9', badge:'Q9', text:'Explain how calcium channel blockers reduce blood pressure.', hint:'What is the mechanism in vascular smooth muscle? Name an example drug.', model:'Calcium channel blockers (e.g. amlodipine, nifedipine — dihydropyridines for BP) block L-type voltage-gated Ca²⁺ channels in vascular smooth muscle cells → prevent Ca²⁺ entry → less Ca²⁺ available to bind calmodulin → myosin light chain kinase not activated → smooth muscle relaxation → vasodilation → ↓ total peripheral resistance → ↓ BP. Dihydropyridine CCBs (amlodipine) are vascular-selective. Non-dihydropyridines (verapamil, diltiazem) also slow the heart rate by acting on cardiac Ca²⁺ channels — used with caution alongside beta-blockers.'},
      {id:'htn-10', badge:'Q10', text:'Why are thiazide diuretics effective in long-term BP control?', hint:'What is the initial mechanism and what changes over time?', model:'Thiazide diuretics (e.g. hydrochlorothiazide, indapamide) work by: (1) Initially: blocking Na⁺/Cl⁻ co-transporter (NCC) in the distal convoluted tubule → ↓ Na⁺ and water reabsorption → ↓ plasma volume → ↓ cardiac output → ↓ BP. (2) Long-term: plasma volume partially recovers, but BP remains lower because of reduced total peripheral resistance — thought to be due to ↓ Na⁺ in vascular smooth muscle → altered Ca²⁺ handling → less vasoconstriction. This explains why thiazides remain effective long-term despite volume recovery. They are particularly effective in elderly and Afro-Caribbean patients (who often have low-renin hypertension).'},
      {id:'htn-11', badge:'Q11', text:'Name one contraindication for beta-blockers and explain why.', hint:'Think about conditions where blocking beta-receptors would worsen the disease.', model:'Multiple contraindications exist for beta-blockers: (1) Asthma / COPD with bronchospasm — beta-2 receptors in bronchi mediate bronchodilation; blockade → bronchoconstriction → dangerous bronchospasm. (2) Second or third-degree AV block — beta-1 receptors in AV node mediate conduction; blockade → further slowing of conduction → complete heart block. (3) Severe peripheral arterial disease — beta-2 blockade → unopposed alpha-mediated vasoconstriction → worsened ischaemia. (4) Phaeochromocytoma (without alpha-blockade first) — beta blockade leaves alpha-mediated vasoconstriction unopposed → hypertensive crisis. Any one with a clear explanation is acceptable.'},
    ]}
  ]
},
{
  id:'rhd', title:'Rheumatic Heart Disease', num:2,
  depts:'Anatomy · Pathology · Pharmacology',
  vignette:'A 14-year-old girl presents with fever, migratory joint pain, and breathlessness. She had a sore throat 3 weeks ago. On examination, a mid-diastolic murmur is heard at the apex. Echocardiography shows thickened mitral valve leaflets with commissural fusion.',
  sections:[
    {label:'Anatomy', cls:'dept-anat', qs:[
      {id:'rhd-1', badge:'Q1', text:'Describe the anatomy of the mitral valve and its supporting structures.', hint:'Include leaflets, supporting structures, and blood supply.', model:'The mitral (bicuspid) valve guards the left atrioventricular orifice. Leaflets: two — (1) Anterior (aortic) leaflet: larger, semicircular; (2) Posterior (mural) leaflet: smaller, rectangular. Supporting structures: (1) Fibrous annulus — ring of the cardiac fibrous skeleton forming the valve base; (2) Chordae tendineae — fibrous cords from free edges and ventricular surfaces of leaflets to papillary muscles, preventing prolapse into the LA during systole; (3) Papillary muscles — anterolateral and posteromedial, projecting from the LV wall; contract in systole to maintain chordal tension. Blood supply: anterolateral papillary muscle supplied by both LAD and LCx; posteromedial papillary muscle (single supply from RCA or LCx) — clinically important as it is more vulnerable to ischaemic rupture.'},
    ]},
    {label:'Pathology', cls:'dept-path', qs:[
      {id:'rhd-2', badge:'Q2', text:'Which layer of the heart is primarily affected in acute rheumatic fever?', hint:'Rheumatic fever can cause pancarditis — but which layer is most important for long-term valve damage?', model:'Acute rheumatic fever causes pancarditis — inflammation of all three layers: (1) Endocarditis — most clinically important; affects valve leaflets (predominantly mitral, then aortic) → verrucous vegetations along the line of valve closure → long-term fibrosis and valve damage. (2) Myocarditis — Aschoff nodules in the myocardium; may cause cardiac failure acutely. (3) Pericarditis — fibrinous pericarditis; usually resolves without sequelae ("bread-and-butter" pericarditis). The endocardium/valvular endothelium is the layer most important for chronic sequelae, as repeated valvulitis leads to progressive mitral stenosis.'},
      {id:'rhd-3', badge:'Q3', text:'Explain the immunological basis of rheumatic fever.', hint:'What triggers it and what is the key immune mechanism?', model:'Group A beta-haemolytic Streptococcus (S. pyogenes) throat infection triggers an abnormal immune response via molecular mimicry: streptococcal M-protein (and other antigens such as N-acetyl-glucosamine) share structural epitopes with human cardiac proteins — myosin, laminin, tropomyosin, and valve collagen. The host immune response (antibodies and T-cells) generated against the bacterium cross-reacts with these cardiac proteins → autoimmune inflammation of the heart valves, myocardium, and pericardium. It is not a direct infection of the heart — it is an aberrant immune response. This explains why only certain M-protein serotypes are "rheumatogenic" and why the disease follows pharyngitis (not skin infections) with Group A strep.'},
      {id:'rhd-4', badge:'Q4', text:'Describe the histological features of acute rheumatic fever.', hint:'What is the pathognomonic histological lesion? Describe its components.', model:'The pathognomonic histological lesion of rheumatic fever is the Aschoff body (Aschoff nodule), found in the myocardium: (1) Central zone of fibrinoid necrosis — eosinophilic amorphous material; (2) Surrounding inflammatory cells: Anitschkow cells (caterpillar cells / Aschoff cells) — large macrophages with elongated nuclei and central chromatin condensation resembling a caterpillar; (3) Aschoff giant cells — multinucleated macrophage giant cells; (4) Lymphocytes and plasma cells at the periphery. On the valve leaflets, during acute phase: small, warty vegetations (verrucae) along the line of closure, composed of fibrin and platelets overlying areas of necrosis. With repeated attacks: progressive fibrosis, calcification, commissural fusion → chronic rheumatic valve disease.'},
      {id:'rhd-5', badge:'Q5', text:'Explain the mechanism of mitral stenosis as a consequence of rheumatic fever.', hint:'Trace the pathological process from acute inflammation to chronic obstruction.', model:'Mechanism: Repeated episodes of acute rheumatic valvulitis → autoimmune inflammation of mitral valve leaflets → fibrinous exudate → organisation into fibrous tissue. Progressive pathological changes: (1) Fusion of anterior and posterior leaflets at the commissures (commissural fusion) → valve orifice narrows from normal ~4–5 cm² to <1 cm² in severe stenosis. (2) Thickening and fibrosis of leaflets → reduced mobility. (3) Fusion and shortening of chordae tendineae → further restriction. (4) Calcification in advanced disease. Haemodynamic consequences: obstruction to LV filling → ↑ left atrial pressure → left atrial dilatation → pulmonary venous hypertension → pulmonary oedema; reduced forward cardiac output; LA dilatation predisposes to AF and thrombus formation.'},
    ]},
    {label:'Pharmacology', cls:'dept-pharma', qs:[
      {id:'rhd-6', badge:'Q6', text:'Why is penicillin used for secondary prophylaxis in rheumatic fever? Explain the rationale.', hint:'Why penicillin specifically? What is secondary prophylaxis trying to prevent?', model:'Rheumatic fever is triggered by Group A beta-haemolytic streptococcal (GAS) pharyngitis. Each recurrent GAS throat infection triggers another episode of acute rheumatic fever → cumulative valve damage → progressive mitral stenosis. Secondary prophylaxis aims to prevent all future GAS pharyngitis infections. Penicillin (specifically benzathine benzylpenicillin G, 1.2 MU IM every 3–4 weeks) is used because: (1) GAS remains universally susceptible to penicillin — no resistance has been documented; (2) Long-acting IM preparation ensures compliance with a single monthly injection; (3) Proven to prevent recurrent attacks and halt disease progression. Duration: ≥5 years after last attack or until age 21 (whichever is longer); lifelong if significant valvular disease. If penicillin-allergic: sulfadiazine or azithromycin.'},
      {id:'rhd-7', badge:'Q7', text:'Describe one major complication of long-standing rheumatic heart disease and explain its basis.', hint:'Multiple complications are possible — describe any one in depth.', model:'All possible major complications: (1) Mitral stenosis progressing to congestive heart failure — ↑ LA pressure → pulmonary hypertension → right heart failure → hepatomegaly, peripheral oedema, ascites. (2) Atrial fibrillation — LA dilatation from chronic elevated pressure → electrical remodelling → AF; worsens haemodynamics and increases thromboembolic risk. (3) Systemic thromboembolism / stroke — LA dilatation + AF + mitral stenosis → stasis → LA thrombus → embolism to brain or periphery. (4) Pulmonary hypertension — chronic ↑ pulmonary venous pressure → reactive pulmonary arterial hypertension → right ventricular failure. (5) Infective endocarditis — damaged valve surface predisposes to bacterial seeding. (6) Aortic or tricuspid valve involvement in advanced disease. Any one described in sufficient depth is acceptable.'},
    ]}
  ]
},
{
  id:'tof', title:'Tetralogy of Fallot', num:3,
  depts:'Anatomy · Pathology',
  vignette:'A 3-year-old child presents with cyanosis and dyspnoea on exertion. The child frequently squats after activity. A systolic murmur is heard. Imaging shows right ventricular hypertrophy and a ventricular septal defect.',
  sections:[
    {label:'Anatomy & Pathology', cls:'dept-anat', qs:[
      {id:'tof-1', badge:'Q1', text:'List the four components of Tetralogy of Fallot.', hint:'All four arise from a single developmental error. List each one clearly.', model:'The four components of Tetralogy of Fallot are: (1) Ventricular septal defect (VSD) — large, perimembranous, subarterial; (2) Right ventricular outflow tract (RVOT) obstruction — subvalvar (infundibular) stenosis, valvar pulmonary stenosis, or both; (3) Overriding aorta — the aortic root is displaced anteriorly and straddles the VSD, receiving blood from both ventricles; (4) Right ventricular hypertrophy (RVH) — a consequence of increased RV pressure from RVOT obstruction. All four result from a single embryological error: anterior and superior displacement of the infundibular (conal) septum.'},
      {id:'tof-2', badge:'Q2', text:'What embryological defect leads to Tetralogy of Fallot?', hint:'Think about the partitioning of the outflow tract during cardiac development.', model:'The underlying embryological defect is abnormal anterior and cephalad (superior) displacement of the infundibular septum (also called the conal septum or outlet septum) during the division of the primitive cardiac outflow tract (truncus arteriosus/conus). This single displacement: (1) Creates the VSD — displaced septum fails to align with and close the muscular interventricular septum; (2) Narrows the RVOT — displaced septum encroaches on the right outflow tract; (3) Causes the aorta to override — aortic root is carried anteriorly over the VSD; (4) Leads to RVH — secondary to the outflow obstruction. Some cases are associated with chromosome 22q11 deletion (DiGeorge syndrome).'},
      {id:'tof-3', badge:'Q3', text:'Explain the type of shunt present in ToF and how it leads to cyanosis.', hint:'Is the shunt left-to-right or right-to-left? What determines the direction?', model:'In Tetralogy of Fallot, a right-to-left shunt exists across the VSD. Direction is determined by the balance between pulmonary vascular resistance and systemic vascular resistance, and by the severity of RVOT obstruction. Because the RVOT is severely obstructed, RV pressure rises to equal or exceed LV pressure. Since the aorta overrides the VSD, deoxygenated blood from the RV is ejected preferentially into the aorta (right-to-left shunt) rather than into the obstructed pulmonary artery. Consequence: deoxygenated (right-sided) blood mixes with oxygenated systemic blood → reduced systemic oxygen saturation → cyanosis. The severity of cyanosis depends on the degree of RVOT obstruction: more obstruction → more right-to-left shunting → more cyanosis.'},
      {id:'tof-4', badge:'Q4', text:'Explain why squatting relieves symptoms in a child with Tetralogy of Fallot.', hint:'What does squatting do to systemic vascular resistance? How does that affect the shunt?', model:'During physical activity, increased sympathetic drive causes infundibular muscle spasm → acute worsening of RVOT obstruction → more right-to-left shunting → hypercyanotic "tet spell". Squatting (or knee-to-chest position) relieves this by: (1) Mechanically kinking (compressing) the femoral arteries → increases systemic vascular resistance (SVR); (2) ↑ SVR → ↑ pressure on the left side of the heart relative to the right → reduced right-to-left shunting across the VSD; (3) More blood is redirected into the pulmonary circulation → improved oxygenation → relief of cyanosis. This is why children with unrepaired ToF instinctively squat after exertion — it is an adaptive physiological manoeuvre.'},
      {id:'tof-5', badge:'Q5', text:'List all the cyanotic and acyanotic congenital heart diseases you know.', hint:'Classify them into the two groups. There are several in each category.', model:'Cyanotic congenital heart diseases (right-to-left shunt, ↓ pulmonary blood flow or mixing): (1) Tetralogy of Fallot (most common cyanotic CHD beyond infancy); (2) Transposition of the great arteries (TGA) — most common cyanotic CHD in neonates; (3) Tricuspid atresia; (4) Total anomalous pulmonary venous return (TAPVR); (5) Truncus arteriosus; (6) Hypoplastic left heart syndrome; (7) Pulmonary atresia; (8) Ebstein\'s anomaly (with right-to-left shunt via ASD/PFO). Acyanotic congenital heart diseases (left-to-right shunt, ↑ pulmonary blood flow): (1) Ventricular septal defect (VSD) — most common CHD overall; (2) Atrial septal defect (ASD); (3) Patent ductus arteriosus (PDA); (4) Atrioventricular septal defect (AVSD / endocardial cushion defect); (5) Coarctation of the aorta; (6) Pulmonary valve stenosis (without shunt); (7) Aortic valve stenosis.'},
    ]}
  ]
},
{
  id:'ie', title:'Infective Endocarditis', num:4,
  depts:'Anatomy · Microbiology · Pharmacology',
  vignette:'A 45-year-old male with a history of rheumatic heart disease presents with fever, malaise, and weight loss for 3 weeks. Examination reveals splinter haemorrhages. Blood cultures grow Streptococcus viridans. Echocardiography shows vegetations on the mitral valve.',
  sections:[
    {label:'Microbiology', cls:'dept-micro', qs:[
      {id:'ie-1', badge:'Q1', text:'Describe how damaged cardiac valves predispose to infective endocarditis.', hint:'Think about the sequence of events from a damaged valve surface to bacterial colonisation.', model:'Normal valve endothelium is non-thrombogenic and resistant to bacterial adhesion. Valve damage (from rheumatic fever, congenital heart disease, degenerative changes, or a prosthetic valve) disrupts the endothelial surface → exposes subendothelial collagen and extracellular matrix → activates platelets and coagulation cascade → deposits of fibrin and platelets form (non-bacterial thrombotic endocarditis / NBTE). This sterile thrombus provides: (1) A physical scaffold for bacterial adhesion; (2) Protection from immune defences (bacteria embedded in fibrin matrix are shielded from neutrophils and complement). When bacteraemia occurs (from dental procedures, gut manipulation, skin infection), circulating bacteria — especially those with surface adhesins (fibronectin-binding proteins, clumping factors) — adhere to the fibrin-platelet thrombus → proliferate → form the infected vegetation.'},
      {id:'ie-2', badge:'Q2', text:'Why is Streptococcus viridans commonly implicated in infective endocarditis in this patient?', hint:'Where does Streptococcus viridans normally live, and how does it reach the heart?', model:'Streptococcus viridans (a group of alpha-haemolytic streptococci including S. mutans, S. sanguinis, S. mitis) are part of the normal oral flora. Route to the heart: dental manipulation, tooth extraction, or even vigorous tooth brushing → transient bacteraemia with S. viridans → bacteria reach the bloodstream → adhere to damaged valve surfaces (pre-existing NBTE from rheumatic heart disease). Virulence factors: S. viridans produces dextran (polysaccharide) that allows adhesion to fibrin-platelet deposits and formation of biofilm. Although low-virulence, it has a particular tropism for abnormal valves. This is why this patient with rheumatic mitral valve disease — with an already damaged valve surface — is susceptible, and why dental hygiene and antibiotic prophylaxis before dental procedures are important.'},
      {id:'ie-3', badge:'Q3', text:'Describe the Duke Criteria for the diagnosis of infective endocarditis.', hint:'There are major and minor criteria. List both categories with examples.', model:'Duke Criteria — Definite IE: 2 major, or 1 major + 3 minor, or 5 minor criteria. MAJOR CRITERIA: (1) Positive blood cultures — typical microorganism (e.g. S. viridans, S. aureus, HACEK group) in ≥2 separate cultures, or persistently positive cultures ≥12 hours apart, or single positive for Coxiella burnetii. (2) Evidence of endocardial involvement on echocardiography — oscillating intracardiac mass (vegetation), abscess, prosthetic valve dehiscence, or new valvular regurgitation. MINOR CRITERIA: (1) Predisposing condition — rheumatic heart disease, congenital heart disease, IVDU, prosthetic valve; (2) Fever ≥38°C; (3) Vascular phenomena — arterial emboli, septic pulmonary infarcts, mycotic aneurysm, intracranial haemorrhage, Janeway lesions; (4) Immunological phenomena — Osler\'s nodes, Roth spots, glomerulonephritis, positive rheumatoid factor; (5) Microbiological evidence not meeting major criteria.'},
      {id:'ie-4', badge:'Q4', text:'List the investigations used in the diagnosis of infective endocarditis and state the role of each.', hint:'Think systematically: microbiology, imaging, blood tests.', model:'Key investigations: (1) Blood cultures (≥3 sets from different sites before antibiotics) — identify the causative organism and guide antibiotic therapy; most important investigation. (2) Echocardiography — transthoracic (TTE) first; transoesophageal (TOE) if TTE negative/inconclusive or prosthetic valve — detects vegetations, abscesses, perivalvular extension, and valvular dysfunction. (3) FBC — leucocytosis; normocytic anaemia of chronic disease. (4) ESR/CRP — elevated, markers of systemic inflammation. (5) Rheumatoid factor — positive in ~50% (immune complex formation). (6) Urinalysis/urine microscopy — haematuria, proteinuria (immune complex glomerulonephritis). (7) ECG — PR prolongation suggests perivalvular abscess extending to AV node. (8) CT/MRI brain — if neurological complications suspected (embolic stroke, mycotic aneurysm). (9) Chest X-ray — pulmonary infarcts/abscesses in right-sided IE.'},
      {id:'ie-5', badge:'Q5', text:'List FOUR complications that can occur in infective endocarditis.', hint:'Complications affect multiple organ systems. List as many as you know; only four are required.', model:'All possible complications: (1) Systemic emboli — vegetation fragments → brain (stroke, cerebral abscess), kidney (renal infarct), spleen (splenic abscess), coronary arteries (MI); (2) Cardiac failure — valve destruction → acute severe regurgitation → haemodynamic collapse; (3) Perivalvular/myocardial abscess — especially with S. aureus; can extend to AV node → complete heart block; (4) Septic pulmonary emboli — right-sided IE → lung abscesses; (5) Mycotic aneurysm — infected emboli to arterial walls → aneurysm formation → rupture (intracranial most dangerous); (6) Immune complex glomerulonephritis → renal failure; (7) Splenic abscess; (8) Metastatic infection (septic arthritis, osteomyelitis); (9) Prosthetic valve dysfunction or dehiscence. Any four are acceptable.'},
    ]},
    {label:'Pharmacology', cls:'dept-pharma', qs:[
      {id:'ie-6', badge:'Q6', text:'What is the principle of antibiotic therapy in infective endocarditis?', hint:'Why is IE treatment different from a typical infection?', model:'The principles of antibiotic therapy in IE are: (1) Bactericidal antibiotics — bacteriostatic drugs are insufficient because opsonisation and phagocytosis are impaired inside the vegetation; bactericidal activity is needed to sterilise the avascular biofilm. (2) High doses — to achieve adequate drug concentrations within the dense fibrin matrix of vegetations (poor penetration). (3) Prolonged duration — 4–6 weeks minimum; organisms in biofilm are metabolically slow and less susceptible; longer therapy prevents relapse. (4) Parenteral (IV) route — ensures reliable drug levels; oral absorption may be inadequate for sustained bactericidal concentrations. (5) Guided by blood culture sensitivities — empirical therapy initiated, then de-escalated or adjusted based on culture results and minimum inhibitory concentrations (MICs).'},
      {id:'ie-7', badge:'Q7', text:'Why is combination antibiotic therapy sometimes used in infective endocarditis?', hint:'What is the benefit of adding a second antibiotic? Give an example.', model:'Combination therapy is used in IE for: (1) Synergy — e.g. penicillin/ampicillin + gentamicin (aminoglycoside): beta-lactam disrupts the cell wall → ↑ intracellular penetration of aminoglycoside → gentamicin inhibits ribosomes → synergistic bactericidal effect, achieving sterilisation of the vegetation more rapidly. Particularly important for Enterococcus endocarditis (which is inherently resistant to aminoglycosides alone). (2) Broader spectrum cover — for polymicrobial infections or when organism is unknown (empirical therapy). (3) Prevention of resistance — combination reduces selection of resistant mutants. However, combination therapy carries greater toxicity risk (gentamicin: nephrotoxicity and ototoxicity), so its use is now increasingly limited to the first few days or avoided in some guidelines.'},
      {id:'ie-8', badge:'Q8', text:'Describe one mechanism of antibiotic resistance relevant to infective endocarditis.', hint:'Multiple mechanisms exist — describe any one clearly.', model:'Multiple resistance mechanisms relevant to IE: (1) Beta-lactamase production (e.g. S. aureus producing penicillinase) — enzyme hydrolyses the beta-lactam ring of penicillin → inactivates the antibiotic; overcome by using beta-lactamase-stable antibiotics (flucloxacillin) or beta-lactamase inhibitor combinations (amoxicillin-clavulanate). (2) Altered penicillin-binding proteins — MRSA produces PBP2a (encoded by mecA gene) with low affinity for all beta-lactams → resistance; vancomycin is used instead. (3) Biofilm-mediated resistance — bacteria in biofilm express different phenotypes (slow metabolism, polysaccharide matrix) → reduced antibiotic penetration and reduced susceptibility. (4) Efflux pumps — actively pump antibiotics out of bacterial cells. (5) Aminoglycoside-modifying enzymes (acetyltransferases, phosphotransferases) → Enterococcus high-level aminoglycoside resistance. Any one mechanism with explanation is acceptable.'},
      {id:'ie-9', badge:'Q9', text:'What prophylactic measures are recommended before dental procedures in patients at risk of infective endocarditis?', hint:'Who is at high risk? What drug is given and when?', model:'Current guidelines (NICE UK / AHA): Antibiotic prophylaxis is recommended for high-risk patients only before dental procedures involving gingival manipulation or mucosal penetration: High-risk groups: (1) Prosthetic cardiac valves (mechanical or biological); (2) Previous infective endocarditis; (3) Certain congenital heart disease — unrepaired cyanotic CHD, repaired CHD with residual defects, or within 6 months of repair with prosthetic material; (4) Cardiac transplant recipients with valvulopathy. Regimen: Amoxicillin 3 g oral single dose, 30–60 minutes before the procedure. If penicillin-allergic: clindamycin 600 mg or azithromycin 500 mg. Additional measures: maintain good oral hygiene (most important long-term measure), chlorhexidine mouthwash, prompt treatment of infections. Note: routine prophylaxis for all RHD patients is no longer recommended by NICE (2008) — only for the above high-risk groups.'},
    ]}
  ]
},
{
  id:'mi', title:'Myocardial Infarction', num:5,
  depts:'Anatomy · Biochemistry · Pathology · Pharmacology',
  vignette:'A 58-year-old diabetic male presents with severe chest pain radiating to the left arm for 2 hours. ECG shows ST elevation in leads II, III, and aVF. Serum troponin is elevated. Lipid profile shows LDL 4.8 mmol/L, HDL 0.8 mmol/L.',
  sections:[
    {label:'Anatomy', cls:'dept-anat', qs:[
      {id:'mi-1', badge:'Q1', text:'Identify the coronary artery most likely involved and explain why.', hint:'ST elevation in leads II, III, aVF corresponds to which territory?', model:'The right coronary artery (RCA) is most likely occluded. ECG reasoning: leads II, III, and aVF are the inferior leads — they face the inferior wall of the left ventricle and the right ventricle. In right-dominant circulation (85% of people), the RCA supplies: the inferior wall of the LV via the posterior descending artery (PDA); the posterior interventricular septum; the right ventricle; the SA node (60% of people); the AV node (80–90% of people). Hence RCA occlusion → inferior STEMI with ST elevation in II, III, aVF. An important clinical implication: RCA occlusion can interrupt the blood supply to the AV node → bradyarrhythmias and AV block as complications of inferior MI.'},
      {id:'mi-2', badge:'Q2', text:'Describe coronary dominance — what does it mean and why does it matter clinically?', hint:'Which artery gives rise to the posterior descending artery (PDA)?', model:'Coronary dominance is defined by which coronary artery gives rise to the posterior descending artery (PDA), which supplies the inferior wall of the LV and posterior interventricular septum. Types: (1) Right dominant (~85%) — RCA gives rise to PDA; (2) Left dominant (~8%) — left circumflex artery (LCx) gives rise to PDA; (3) Codominant (~7%) — both RCA and LCx contribute to PDA supply. Clinical importance: (1) Determines the territory at risk with each vessel\'s occlusion — in a left-dominant patient, LCx occlusion causes inferior MI (not just lateral); (2) Guides coronary angiography and PCI — the interventional cardiologist needs to know dominance to target the correct vessel; (3) In right-dominant hearts, inferior MI (RCA) commonly involves the AV nodal artery → high risk of AV block; (4) RCA is also the dominant artery in right ventricular infarction, which requires different management (avoid nitrates; fluid loading).'},
    ]},
    {label:'Biochemistry', cls:'dept-biochem', qs:[
      {id:'mi-3', badge:'Q3', text:'Explain the biochemical basis of troponin elevation in myocardial infarction.', hint:'What happens to the cardiomyocyte membrane when it is ischaemic?', model:'Myocardial ischaemia → cessation of oxidative phosphorylation → ATP depletion within seconds to minutes. Consequences of ATP depletion: (1) Na⁺/K⁺-ATPase fails → intracellular Na⁺ accumulates → Ca²⁺ entry via Na⁺/Ca²⁺ exchanger → intracellular Ca²⁺ overload → mitochondrial dysfunction; (2) Cellular swelling and membrane damage → cell membrane becomes permeable and eventually ruptures. Troponin release: troponin I (cTnI) and troponin T (cTnT) are structural proteins of the cardiac sarcomere that regulate actin-myosin interaction. Initially, cytosolic (free) troponin leaks across the damaged membrane; later, structural (bound) troponin is released as the sarcomere disintegrates. Rise: detectable at 3–4 hours, peaks at 12–24 hours, remains elevated for 7–14 days. This prolonged elevation allows diagnosis even in late presenters.'},
      {id:'mi-4', badge:'Q4', text:'Compare troponin and CK-MB as diagnostic markers for myocardial infarction.', hint:'Consider specificity, sensitivity, time course, and clinical utility.', model:'Comparison: TROPONIN (cTnI or cTnT): Specificity — high; cardiac-specific isoforms not expressed in skeletal muscle (unlike CK-MB). Sensitivity — superior, especially for small/minor infarcts. Rise: 3–4 hours. Peak: 12–24 hours. Duration: 7–14 days (cTnI), up to 14 days (cTnT). Clinical utility — gold standard; useful for late presenters; highly sensitive assays can detect NSTEMI and myocardial injury from other causes (PE, myocarditis). CK-MB (Creatine Kinase-MB isoform): Specificity — lower; CK-MB is also present in skeletal muscle (though in smaller amounts); can be elevated in rhabdomyolysis, polymyositis. Sensitivity — lower for small infarcts. Rise: 3–4 hours. Peak: 12–24 hours. Duration: returns to normal in 48–72 hours. Clinical utility — earlier return to baseline makes it potentially useful for detecting re-infarction (a troponin rise may persist from the first MI); used in older literature and some centres. Overall: troponin is preferred as the primary marker; high-sensitivity troponin assays have largely replaced CK-MB.'},
    ]},
    {label:'Pathology', cls:'dept-path', qs:[
      {id:'mi-5', badge:'Q5', text:'Describe the sequence of pathological changes following myocardial infarction from onset to scar formation.', hint:'Go through each time period systematically — from 0 hours through to weeks/months.', model:'Sequence of changes: 0–6 hours: No light microscopic change. EM shows wavy fibres, mitochondrial swelling. Irreversible injury occurs by 20–40 minutes. Gross: no change early; then may see pallor. 6–24 hours: Coagulative necrosis established — cardiomyocytes show hypereosinophilia, nuclear pyknosis/karyolysis, loss of cross-striations. Neutrophil infiltration begins. Gross: pale/yellow infarcted zone. 1–3 days: Dense neutrophil infiltration ("demolition phase") — phagocytosis of necrotic debris. 3–7 days: Macrophage infiltration replaces neutrophils — ongoing phagocytosis. Granulation tissue begins at the infarct periphery. This is the period of maximum softening of the infarct wall → highest risk of rupture. Gross: central softening, yellow necrotic tissue. 1–3 weeks: Progressive granulation tissue formation — neovascularisation, fibroblast proliferation, collagen deposition. 1–3 months: Dense collagenous scar replaces granulation tissue. Fibrotic scar is non-contractile but electrically stable. Gross: pale grey, firm, contracted scar. Implications: scar non-contractile → regional wall motion abnormality; electrically heterogeneous border zone → arrhythmia substrate; ventricular remodelling and dilatation may progress to heart failure.'},
      {id:'mi-6', badge:'Q6', text:'What is the most common underlying cause of myocardial infarction?', hint:'Think about the pathological process in the coronary arteries.', model:'The most common underlying cause is atherosclerotic coronary artery disease complicated by plaque rupture and thrombosis. The sequence: (1) Atherosclerosis — accumulation of lipid-laden plaques (atheromatous plaques) in coronary artery walls, built up over years from LDL deposition, foam cell formation (macrophages engulfing oxidised LDL), smooth muscle proliferation, and fibrous cap formation. (2) Vulnerable (unstable) plaque — thin fibrous cap, large lipid core, macrophage-rich shoulders → prone to rupture. (3) Plaque rupture — cap disruption exposes subendothelial collagen and lipid → platelet adhesion and aggregation → fibrin clot formation → acute coronary thrombosis → complete coronary occlusion → STEMI. Risk factors that accelerate atherosclerosis: hypertension, diabetes mellitus, dyslipidaemia, smoking, family history, obesity. In this patient: diabetes, hyperlipidaemia, and likely smoking are major contributors.'},
      {id:'mi-7', badge:'Q7', text:'What complications may occur within the first 24 hours of myocardial infarction?', hint:'Think electrical, haemodynamic, and mechanical complications.', model:'Complications within the first 24 hours: (1) Arrhythmias — most common early complication; ventricular fibrillation (VF) is the leading cause of early death; ventricular tachycardia (VT); bradyarrhythmias and AV block (especially in inferior MI from RCA occlusion — AV nodal ischaemia). (2) Cardiogenic shock — extensive LV damage (>40% myocardium) → severe pump failure → ↓ CO → ↓ BP → ↓ organ perfusion; high mortality. (3) Acute left ventricular failure / pulmonary oedema — ↓ LV function → ↑ LVEDP → ↑ left atrial pressure → pulmonary venous hypertension → acute pulmonary oedema. (4) Right ventricular infarction (in inferior MI) — RV failure → hypotension without pulmonary oedema; requires fluid loading. (5) Pericarditis — early (within 24–48 hours) — fibrinous pericarditis overlying the infarct zone.'},
      {id:'mi-8', badge:'Q8', text:'What structural complication occurs 3–7 days post-MI and why is this the most dangerous period?', hint:'What is happening to the necrotic myocardium at this time point?', model:'Cardiac rupture (free wall rupture, papillary muscle rupture, or ventricular septal rupture) occurs most commonly at 3–7 days post-MI. Why this period is most dangerous: At days 3–7, the infarcted myocardium undergoes maximal softening ("yellow softening") — neutrophils have released proteolytic enzymes (elastases, collagenases, matrix metalloproteinases) that digest the necrotic tissue, but granulation tissue and collagen replacement have not yet provided structural integrity. The necrotic wall is at its weakest point. Types of rupture: (1) Free wall rupture → haemopericardium → cardiac tamponade → sudden death (Beck\'s triad: ↓ BP, ↑ JVP, muffled heart sounds); (2) Papillary muscle rupture (posterior most common — single blood supply from RCA) → acute severe mitral regurgitation → acute pulmonary oedema; (3) VSD rupture → acute left-to-right shunt → biventricular failure. All are surgical emergencies.'},
    ]},
    {label:'Pharmacology', cls:'dept-pharma', qs:[
      {id:'mi-9', badge:'Q9', text:'Name two drugs used in the acute management of MI and explain their roles.', hint:'Multiple drugs are used. Name any two with clear explanations of what they do.', model:'All drugs used in acute MI management — any two with explanation are acceptable: (1) Aspirin 300 mg (loading) — irreversible COX-1 inhibitor → ↓ thromboxane A₂ → ↓ platelet aggregation → reduces thrombus propagation. (2) P2Y12 inhibitor (ticagrelor 180 mg or clopidogrel 300 mg) — blocks ADP receptor on platelets → ↓ aggregation; combined with aspirin = dual antiplatelet therapy (DAPT). (3) Heparin/enoxaparin — activates antithrombin III → inhibits thrombin and factor Xa → prevents thrombus extension. (4) Sublingual GTN — converted to nitric oxide → smooth muscle relaxation → venodilation (↓ preload) + coronary vasodilation → ↓ myocardial oxygen demand and ↑ supply. (5) IV morphine — analgesia; ↓ sympathetic drive; ↓ preload; reduces anxiety. (6) Oxygen — if SpO₂ <94% (avoid hyperoxia — worsens reperfusion injury). (7) Beta-blockers (metoprolol) — ↓ HR and contractility → ↓ O₂ demand; limit infarct size; anti-arrhythmic. Any two of these with their mechanisms are acceptable.'},
      {id:'mi-10', badge:'Q10', text:'What is the role of beta-blockers post-MI? Explain both the immediate and long-term benefits.', hint:'Think about why the heart is vulnerable after MI and how beta-blockade helps.', model:'Beta-blockers (e.g. carvedilol, bisoprolol, metoprolol) post-MI: IMMEDIATE benefits: (1) Reduce heart rate and myocardial contractility → ↓ myocardial oxygen demand → limit infarct extension; (2) Anti-arrhythmic — ↓ sympathetic tone → raise the threshold for ventricular fibrillation → reduce risk of fatal arrhythmias; (3) Anti-ischaemic — prolonged diastole → more time for coronary perfusion. LONG-TERM benefits: (1) Prevent ventricular remodelling — ↓ catecholamine-driven myocardial remodelling → preserve LV geometry and function; (2) Reduce risk of sudden cardiac death — largest mortality benefit; (3) Prevent recurrent MI; (4) Treat heart failure — carvedilol (beta-1/beta-2/alpha-1 blocker) and bisoprolol/metoprolol have proven mortality benefit in heart failure with reduced ejection fraction (HFrEF), which may develop post-MI. Initiated when haemodynamically stable; contraindicated in cardiogenic shock, severe bronchospasm, or significant bradycardia/heart block.'},
    ]}
  ]
}
];

/* ═══════════════════════════════════════════
   MODEL ANSWER LOOKUP
═══════════════════════════════════════════ */
const modelAnswers = {};
CASES.forEach(cas => cas.sections.forEach(sec => sec.qs.forEach(q => { modelAnswers[q.id] = q.model; })));

/* ═══════════════════════════════════════════
   GRADING  (calls Anthropic API)
═══════════════════════════════════════════ */
async function submitAnswer(qid) {
  const ta   = document.getElementById(`ta-${qid}`);
  const sbtn = document.getElementById(`sbtn-${qid}`);
  const load = document.getElementById(`load-${qid}`);
  const fb   = document.getElementById(`fb-${qid}`);
  const retry= document.getElementById(`retry-${qid}`);

  const studentAnswer = ta.value.trim();
  if (!studentAnswer) { ta.style.borderColor='var(--crimson)'; ta.focus(); return; }

  ta.disabled = true;
  sbtn.disabled = true;
  sbtn.style.display = 'none';
  load.classList.add('show');
  fb.className = 'feedback';
  fb.style.display = 'none';
  retry.style.display = 'none';

  const modelAnswer = modelAnswers[qid];

  const systemPrompt = `You are a medical education evaluator for MBBS preclinical students. 
You will evaluate a student's free-text answer against a model answer for a case-based question.

Respond ONLY with a valid JSON object in this exact format:
{
  "verdict": "correct" | "partial" | "incorrect",
  "label": "Well done!" | "Partially correct" | "Not quite",
  "summary": "One sentence verdict on the answer",
  "explanation": "A clear educational explanation. If the question asks for TWO or THREE features/causes/etc., list ALL possible correct answers (not just the number asked), formatted as an HTML <ul><li> list. Always explain why each point is important. Be encouraging in tone.",
  "encouragement": "A short (1–2 sentence) warm, encouraging message appropriate to the verdict"
}

Grading rubric:
- "correct": Student has captured the key concepts accurately and sufficiently
- "partial": Student has some correct elements but is missing important points or has minor errors  
- "incorrect": Student's answer is fundamentally wrong, blank, or shows major misconceptions

Be fair and generous — credit correct ideas even if phrased differently from the model answer.
If the question asks for TWO or THREE items and the student lists the correct number correctly, that counts as correct.
In the explanation, always list ALL possible correct answers even if more than the number asked, so the student learns comprehensively.`;

  const userPrompt = `Question: ${document.querySelector(`#card-${qid} .q-text`).textContent}

Model answer (use as the authoritative reference):
${modelAnswer}

Student's answer:
${studentAnswer}

Evaluate and respond with JSON only.`;

  try {
    const resp = await fetch('https://api.anthropic.com/v1/messages', {
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body: JSON.stringify({
        model:'claude-sonnet-4-20250514',
        max_tokens:1000,
        system: systemPrompt,
        messages:[{role:'user', content: userPrompt}]
      })
    });

    const data = await resp.json();
    const raw  = data.content.map(c => c.text||'').join('');
    const clean = raw.replace(/```json|```/g,'').trim();
    const result = JSON.parse(clean);

    load.classList.remove('show');

    const fbLabel = document.getElementById(`fblbl-${qid}`);
    const fbVerd  = document.getElementById(`fbverd-${qid}`);
    const fbBody  = document.getElementById(`fbbody-${qid}`);
    const fbEnc   = document.getElementById(`fbenc-${qid}`);

    fb.className = `feedback show ${result.verdict}`;
    fbLabel.textContent = result.verdict === 'correct' ? '✓ Correct' : result.verdict === 'partial' ? '◑ Partially Correct' : '✗ Incorrect';
    fbVerd.textContent = result.summary;
    fbBody.innerHTML = result.explanation;
    fbEnc.textContent = result.encouragement;

    retry.style.display = 'inline-block';

  } catch(err) {
    load.classList.remove('show');
    fb.className = 'feedback show incorrect';
    document.getElementById(`fblbl-${qid}`).textContent = 'Error';
    document.getElementById(`fbverd-${qid}`).textContent = 'Could not evaluate answer.';
    document.getElementById(`fbbody-${qid}`).textContent = 'Please check your connection and try again. (' + err.message + ')';
    document.getElementById(`fbenc-${qid}`).textContent = '';
    sbtn.style.display = 'inline-block';
    sbtn.disabled = false;
    ta.disabled = false;
  }
}

function retryQ(qid) {
  const ta   = document.getElementById(`ta-${qid}`);
  const sbtn = document.getElementById(`sbtn-${qid}`);
  const fb   = document.getElementById(`fb-${qid}`);
  const retry= document.getElementById(`retry-${qid}`);
  ta.value = '';
  ta.disabled = false;
  ta.style.borderColor = '';
  sbtn.style.display = 'inline-block';
  sbtn.disabled = false;
  fb.className = 'feedback';
  retry.style.display = 'none';
  ta.focus();
}

/* ═══════════════════════════════════════════
   ACTIVE NAV HIGHLIGHT
═══════════════════════════════════════════ */
const obs = new IntersectionObserver(entries => {
  entries.forEach(e => {
    if (e.isIntersecting) {
      const idx = e.target.id.replace('case-','');
      document.querySelectorAll('.cnav-btn').forEach((b,i) => b.classList.toggle('active', i==idx));
    }
  });
}, {threshold:0.2});
CASES.forEach((_,ci) => { const el = document.getElementById(`case-${ci}`); if(el) obs.observe(el); });
</script>
